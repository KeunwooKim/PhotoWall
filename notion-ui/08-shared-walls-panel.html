<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoWall — 공동 벽 패널</title>
</head>
<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

<div style="max-width:390px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08);background:#fafafa;position:relative;height:720px;">

  <div style="position:absolute;inset:0;background:rgba(0,0,0,.2);"></div>

  <div style="position:absolute;top:0;right:0;width:85%;max-width:320px;height:100%;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;">

    <div style="display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(26,26,26,.08);">
      <div>
        <div style="font-size:14px;font-weight:600;">공동 인생네컷</div>
        <div style="font-size:11px;color:#737373;margin-top:2px;">친구와 함께 한 벽에 사진을 모아요</div>
      </div>
      <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#737373;">✕</div>
    </div>

    <div style="flex:1;overflow:auto;padding:20px;">

      <!-- Invite -->
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">받은 초대 (1)</div>
      <div style="padding:12px;border-radius:12px;border:1px solid rgba(232,160,191,.3);background:rgba(232,160,191,.05);margin-bottom:20px;">
        <div style="font-size:13px;font-weight:500;">2024 여름 네컷</div>
        <div style="font-size:10px;color:#737373;margin-top:2px;">민지님의 초대</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <div style="flex:1;text-align:center;padding:6px;border-radius:8px;background:#1a1a1a;color:#fafafa;font-size:11px;font-weight:500;">수락</div>
          <div style="padding:6px 12px;border-radius:8px;background:rgba(26,26,26,.05);font-size:11px;font-weight:500;">거절</div>
        </div>
      </div>

      <!-- Create -->
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">새 공동 벽</div>
      <div style="padding:8px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.1);font-size:13px;color:#737373;margin-bottom:8px;">우리 인생네컷</div>
      <div style="width:100%;padding:10px;border-radius:12px;background:#1a1a1a;color:#fafafa;text-align:center;font-size:13px;font-weight:500;margin-bottom:20px;">공동 벽 만들기</div>

      <!-- List -->
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">내 공동 벽 (2)</div>

      <div style="padding:12px;border-radius:12px;border:1px solid rgba(26,26,26,.08);margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;">
          <div><div style="font-size:13px;font-weight:500;">졸업 네컷</div><div style="font-size:10px;color:#737373;">3명 · 방장</div></div>
          <div style="padding:6px 10px;border-radius:8px;background:rgba(26,26,26,.05);font-size:11px;font-weight:500;">꾸미기</div>
        </div>
        <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(26,26,26,.08);">
          <div style="font-size:10px;color:#737373;margin-bottom:6px;">친구 초대</div>
          <span style="display:inline-block;padding:4px 8px;border-radius:8px;background:rgba(26,26,26,.04);font-size:10px;margin-right:4px;">+ 민지</span>
          <span style="display:inline-block;padding:4px 8px;border-radius:8px;background:rgba(26,26,26,.04);font-size:10px;">+ 준호</span>
        </div>
      </div>

      <div style="padding:12px;border-radius:12px;border:1px solid rgba(26,26,26,.08);">
        <div style="display:flex;justify-content:space-between;">
          <div><div style="font-size:13px;font-weight:500;">우리 인생네컷</div><div style="font-size:10px;color:#737373;">2명 · 멤버</div></div>
          <div style="padding:6px 10px;border-radius:8px;background:rgba(26,26,26,.05);font-size:11px;font-weight:500;">꾸미기</div>
        </div>
      </div>
    </div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 공동 벽 패널</p>
</body>
</html>
