<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoWall — 꾸미기 메뉴</title>
</head>
<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

<div style="max-width:390px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08);background:#fff;position:relative;height:720px;">

  <div style="position:absolute;inset:0;background:rgba(0,0,0,.2);"></div>

  <div style="position:absolute;top:0;left:0;width:85%;max-width:320px;height:100%;background:#fff;box-shadow:4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;">

    <div style="display:flex;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(26,26,26,.08);">
      <div>
        <div style="font-size:14px;font-weight:600;">꾸미기</div>
        <div style="font-size:11px;color:#737373;margin-top:2px;">사진을 끌어다 놓거나 올려보세요</div>
      </div>
      <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#737373;">✕</div>
    </div>

    <div style="flex:1;overflow:auto;padding:20px;">

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">사진</div>
      <div style="width:100%;padding:12px;border-radius:12px;background:#1a1a1a;color:#fafafa;text-align:center;font-size:13px;font-weight:500;margin-bottom:4px;">네컷 사진 올리기</div>
      <div style="font-size:10px;color:#737373;margin-bottom:20px;">캔버스에 사진을 끌어다 놓을 수도 있어요</div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">벽지</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1px solid #1a1a1a;background:rgba(26,26,26,.04);font-size:11px;font-weight:500;"><span style="width:20px;height:20px;border-radius:4px;background:#fff;border:1px solid #eee;"></span>화이트</div>
        <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.08);font-size:11px;"><span style="width:20px;height:20px;border-radius:4px;background:#fff5f8;"></span>핑크</div>
        <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.08);font-size:11px;"><span style="width:20px;height:20px;border-radius:4px;background:#f0f9ff;"></span>스카이</div>
        <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.08);font-size:11px;"><span style="width:20px;height:20px;border-radius:4px;background:#fef3c7;"></span>크림</div>
      </div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">마스킹 테이프</div>
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <div style="width:64px;height:36px;border-radius:6px;background:#f9a8c9;opacity:.8;"></div>
        <div style="width:64px;height:36px;border-radius:6px;background:#a8e6cf;opacity:.8;"></div>
        <div style="width:64px;height:36px;border-radius:6px;background:#fde68a;opacity:.8;"></div>
        <div style="width:64px;height:36px;border-radius:6px;background:#c4b5fd;opacity:.8;"></div>
      </div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">스티커</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;">
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(26,26,26,.04);display:flex;align-items:center;justify-content:center;font-size:20px;">⭐</div>
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(26,26,26,.04);display:flex;align-items:center;justify-content:center;font-size:20px;">💕</div>
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(26,26,26,.04);display:flex;align-items:center;justify-content:center;font-size:20px;">✨</div>
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(26,26,26,.04);display:flex;align-items:center;justify-content:center;font-size:20px;">🌸</div>
      </div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">도구</div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <div style="padding:8px 12px;border-radius:8px;background:rgba(26,26,26,.08);font-size:11px;font-weight:500;">선택</div>
        <div style="padding:8px 12px;border-radius:8px;background:rgba(26,26,26,.04);font-size:11px;">펜</div>
        <div style="padding:8px 12px;border-radius:8px;background:rgba(26,26,26,.04);font-size:11px;color:#737373;">↩</div>
        <div style="padding:8px 12px;border-radius:8px;background:rgba(26,26,26,.04);font-size:11px;color:#737373;">↪</div>
      </div>
    </div>

    <div style="padding:16px 20px;border-top:1px solid rgba(26,26,26,.08);">
      <div style="width:100%;padding:12px;border-radius:12px;background:#1a1a1a;color:#fafafa;text-align:center;font-size:13px;font-weight:500;margin-bottom:8px;">저장하기</div>
      <div style="width:100%;padding:10px;border-radius:12px;border:1px solid rgba(26,26,26,.1);text-align:center;font-size:13px;color:#737373;">전체 지우기</div>
    </div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 꾸미기 메뉴 (편집기 ☰ 버튼)</p>
</body>
</html>
