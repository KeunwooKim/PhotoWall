<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoWall — 내 정보</title>
</head>
<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

<div style="max-width:390px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08);background:#fafafa;color:#1a1a1a;">

  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(26,26,26,.08);background:rgba(255,255,255,.9);">
    <span style="font-size:16px;font-weight:700;">PhotoWall</span>
    <span style="font-size:11px;color:#737373;">디지털 포토월</span>
  </div>

  <div style="padding:24px 20px 16px;min-height:520px;">

    <!-- Profile -->
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:80px;height:80px;margin:0 auto 16px;border-radius:50%;background:rgba(232,160,191,.2);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#c97b9a;box-shadow:0 0 0 2px rgba(232,160,191,.3);">K</div>
      <div style="font-size:20px;font-weight:700;">김큰우</div>
      <div style="margin-top:4px;font-size:13px;color:#737373;">user@gmail.com</div>
    </div>

    <!-- Friend code -->
    <div style="padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;margin-bottom:16px;">
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;">내 친구 코드</div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <div style="flex:1;padding:10px 12px;border-radius:12px;background:#fafafa;text-align:center;font-family:monospace;font-size:13px;letter-spacing:.2em;">AB12CD34</div>
        <div style="padding:10px 16px;border-radius:12px;background:#1a1a1a;color:#fafafa;font-size:11px;font-weight:500;display:flex;align-items:center;">복사</div>
      </div>
      <div style="margin-top:8px;font-size:11px;color:#737373;">친구에게 코드를 공유하면 서로 연결돼요</div>
    </div>

    <!-- Menu -->
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="display:flex;align-items:center;gap:16px;padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;">
        <span style="font-size:24px;">🖼️</span>
        <div><div style="font-size:13px;font-weight:600;">내 벽 꾸미기</div><div style="font-size:11px;color:#737373;margin-top:2px;">개인 포토월 편집</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;">
        <span style="font-size:24px;">👯</span>
        <div><div style="font-size:13px;font-weight:600;">공동 벽</div><div style="font-size:11px;color:#737373;margin-top:2px;">친구와 함께 모으는 인생네컷</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;">
        <span style="font-size:24px;">💌</span>
        <div><div style="font-size:13px;font-weight:600;">친구 목록</div><div style="font-size:11px;color:#737373;margin-top:2px;">친구 추가 · 벽 방문</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;">
        <span style="font-size:24px;">⚙️</span>
        <div><div style="font-size:13px;font-weight:600;">설정</div><div style="font-size:11px;color:#737373;margin-top:2px;">테마 · 환경 설정</div></div>
      </div>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <span style="display:inline-block;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid rgba(26,26,26,.1);font-size:11px;font-weight:500;">김큰우</span>
      <span style="display:inline-block;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid rgba(26,26,26,.1);font-size:11px;color:#737373;margin-left:4px;">로그아웃</span>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(26,26,26,.08);background:rgba(255,255,255,.95);padding:8px 0 12px;">
    <div style="text-align:center;font-size:10px;font-weight:500;color:#737373;">🏠<br>홈</div>
    <div style="text-align:center;font-size:10px;font-weight:500;color:#737373;">🖼<br>벽꾸미기</div>
    <div style="text-align:center;font-size:10px;font-weight:500;color:#c97b9a;">👤<br>내정보</div>
    <div style="text-align:center;font-size:10px;font-weight:500;color:#737373;">⚙️<br>설정</div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 내 정보 (/profile)</p>
</body>
</html>
