<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

    </div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 벽 보기 (/wall/[id])<br>♥ 응원하기 → 응원 &amp; 방명록 패널</p>
