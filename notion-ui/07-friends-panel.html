<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoWall — 친구 패널</title>
</head>
<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

<div style="max-width:390px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08);background:#fafafa;position:relative;height:720px;">

  <!-- Dimmed background -->
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.2);"></div>

  <!-- Slide panel -->
  <div style="position:absolute;top:0;right:0;width:85%;max-width:320px;height:100%;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;">

    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:16px 20px;border-bottom:1px solid rgba(26,26,26,.08);">
      <div>
        <div style="font-size:14px;font-weight:600;">친구</div>
        <div style="font-size:11px;color:#737373;margin-top:2px;">코드로 친구를 추가하고 벽을 방문해요</div>
      </div>
      <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#737373;">✕</div>
    </div>

    <div style="flex:1;overflow:auto;padding:20px;">

      <div style="padding:16px;border-radius:12px;background:rgba(26,26,26,.03);margin-bottom:20px;">
        <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;">내 친구 코드</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <div style="flex:1;padding:8px 12px;border-radius:8px;background:#fff;border:1px solid rgba(0,0,0,.08);font-family:monospace;font-size:13px;letter-spacing:.2em;text-align:center;">XY98ZW76</div>
          <div style="padding:8px 12px;border-radius:8px;background:#1a1a1a;color:#fafafa;font-size:11px;font-weight:500;">복사</div>
        </div>
      </div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">친구 추가</div>
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <div style="flex:1;padding:8px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.1);font-size:13px;color:#737373;">친구 코드 입력</div>
        <div style="padding:8px 16px;border-radius:12px;background:#1a1a1a;color:#fafafa;font-size:11px;font-weight:500;">추가</div>
      </div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">친구 목록 (2)</div>

      <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.08);margin-bottom:8px;">
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(26,26,26,.06);display:flex;align-items:center;justify-content:center;font-size:14px;">민</div>
        <div style="flex:1;"><div style="font-size:13px;font-weight:500;">민지</div><div style="font-size:10px;color:#737373;">MN12JI34</div></div>
        <div style="padding:6px 10px;border-radius:8px;background:rgba(26,26,26,.05);font-size:11px;font-weight:500;">벽 방문</div>
      </div>

      <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.08);">
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(26,26,26,.06);display:flex;align-items:center;justify-content:center;font-size:14px;">준</div>
        <div style="flex:1;"><div style="font-size:13px;font-weight:500;">준호</div><div style="font-size:10px;color:#737373;">JH56KL78</div></div>
        <div style="padding:6px 10px;font-size:10px;color:#737373;">벽 비공개</div>
      </div>
    </div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 친구 패널 (내정보 / 편집기에서 열림)</p>
</body>
</html>
