<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoWall — 설정</title>
</head>
<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

<div style="max-width:390px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08);background:#fafafa;color:#1a1a1a;">

  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid rgba(26,26,26,.08);background:rgba(255,255,255,.9);">
    <span style="font-size:16px;font-weight:700;">PhotoWall</span>
    <span style="font-size:11px;color:#737373;">디지털 포토월</span>
  </div>

  <div style="padding:24px 20px 16px;min-height:520px;">

    <h1 style="margin:0;font-size:20px;font-weight:700;">설정</h1>
    <p style="margin:4px 0 24px;font-size:13px;color:#737373;">앱 환경을 맞춰 보세요</p>

    <!-- Theme -->
    <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:12px;">테마</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;border-radius:16px;border:1px solid #c97b9a;background:rgba(232,160,191,.1);">
        <div><div style="font-size:13px;font-weight:600;">라이트</div><div style="font-size:11px;color:#737373;margin-top:2px;">밝은 화면</div></div>
        <span style="color:#c97b9a;font-size:14px;">✓</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;">
        <div><div style="font-size:13px;font-weight:600;">다크</div><div style="font-size:11px;color:#737373;margin-top:2px;">어두운 화면</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;">
        <div><div style="font-size:13px;font-weight:600;">시스템</div><div style="font-size:11px;color:#737373;margin-top:2px;">기기 설정 따름</div></div>
      </div>
    </div>

    <!-- Privacy -->
    <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:12px;">개인정보</div>
    <div style="padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;margin-bottom:24px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;">
        <div>
          <div style="font-size:13px;font-weight:600;">친구 벽 방문 허용</div>
          <div style="margin-top:4px;font-size:11px;line-height:1.5;color:#737373;">켜야 친구가 내 개인 벽을 방문할 수 있어요. 기본값은 비공개예요.</div>
        </div>
        <div style="width:48px;height:28px;border-radius:999px;background:rgba(26,26,26,.15);position:relative;flex-shrink:0;">
          <div style="width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);position:absolute;top:2px;left:2px;"></div>
        </div>
      </div>
    </div>

    <!-- Account -->
    <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:12px;">계정</div>
    <div style="padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;margin-bottom:24px;">
      <span style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;background:#fff;border:1px solid rgba(26,26,26,.1);font-size:11px;font-weight:500;">🔵 Google 로그인</span>
    </div>

    <!-- Info -->
    <div style="padding:16px;border-radius:16px;border:1px solid rgba(26,26,26,.08);background:#fff;">
      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;">정보</div>
      <div style="margin-top:12px;font-size:13px;">
        <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:#737373;">버전</span><span>0.1.0 MVP</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:#737373;">에디터</span><span>Fabric.js</span></div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(26,26,26,.08);background:rgba(255,255,255,.95);padding:8px 0 12px;">
    <div style="text-align:center;font-size:10px;font-weight:500;color:#737373;">🏠<br>홈</div>
    <div style="text-align:center;font-size:10px;font-weight:500;color:#737373;">🖼<br>벽꾸미기</div>
    <div style="text-align:center;font-size:10px;font-weight:500;color:#737373;">👤<br>내정보</div>
    <div style="text-align:center;font-size:10px;font-weight:500;color:#c97b9a;">⚙️<br>설정</div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 설정 (/settings)</p>
</body>
</html>
