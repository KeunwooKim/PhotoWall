<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoWall — 공동 벽 편집</title>
</head>
<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

<div style="max-width:390px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08);background:#fff;position:relative;height:720px;">

  <!-- Pink top bar -->
  <div style="position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fce7f3;border-bottom:1px solid #fbcfe8;box-shadow:0 2px 8px rgba(0,0,0,.06);">
    <div style="padding:10px 16px;border-radius:999px;background:#fff;border:1px solid #fbcfe8;font-size:13px;font-weight:600;color:#1a1a1a;">← 내 벽으로</div>
    <div style="font-size:13px;font-weight:600;color:#9d174d;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">우리 인생네컷</div>
    <div style="width:100px;"></div>
  </div>

  <!-- Canvas -->
  <div style="position:absolute;inset:0;top:56px;bottom:64px;background:linear-gradient(135deg,#fff5f8,#fff);">
    <div style="position:absolute;top:80px;left:30px;width:95px;height:125px;background:#ddd;border-radius:4px;transform:rotate(-4deg);box-shadow:0 4px 12px rgba(0,0,0,.12);"></div>
    <div style="position:absolute;top:100px;left:140px;width:95px;height:125px;background:#ddd;border-radius:4px;transform:rotate(5deg);box-shadow:0 4px 12px rgba(0,0,0,.12);"></div>
    <div style="position:absolute;top:90px;left:250px;width:95px;height:125px;background:#ddd;border-radius:4px;transform:rotate(-2deg);box-shadow:0 4px 12px rgba(0,0,0,.12);"></div>
  </div>

  <!-- Menu btn (offset below pink bar) -->
  <div style="position:absolute;top:72px;left:16px;width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.1);border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;font-size:18px;z-index:2;">☰</div>

  <!-- Pink bottom bar -->
  <div style="position:absolute;bottom:0;left:0;right:0;z-index:3;padding:12px 16px;background:rgba(252,231,243,.95);border-top:1px solid #fbcfe8;">
    <div style="width:100%;padding:14px;border-radius:12px;background:#fff;border:1px solid #fbcfe8;text-align:center;font-size:13px;font-weight:600;color:#1a1a1a;">← 내 벽으로 돌아가기</div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 공동 벽 편집 (/shared/[id])<br>핑크 상·하단 바 = 공동 벽 전용 UI</p>
</body>
</html>
