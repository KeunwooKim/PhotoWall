<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoWall — 응원 &amp; 방명록</title>
</head>
<body style="margin:0;padding:24px;background:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

<div style="max-width:390px;margin:0 auto;border-radius:28px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.08);background:#fff;position:relative;height:720px;">

  <!-- Wall background -->
  <div style="position:absolute;inset:0;background:#f5f5f5;"></div>
  <div style="position:absolute;top:16px;right:16px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.9);border:1px solid rgba(0,0,0,.08);font-size:11px;font-weight:500;">♥ 5</div>

  <!-- Dim -->
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.3);"></div>

  <!-- Bottom sheet -->
  <div style="position:absolute;bottom:0;left:0;right:0;max-height:70%;background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.15);overflow:auto;">

    <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(26,26,26,.08);">
      <div style="font-size:14px;font-weight:600;">응원 &amp; 방명록</div>
      <div style="padding:8px;color:#737373;">✕</div>
    </div>

    <div style="padding:16px 20px;">

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="padding:10px 16px;border-radius:12px;background:#ffe4e6;color:#e11d48;font-size:13px;font-weight:500;">♥ 응원 중</div>
        <div style="font-size:13px;color:#737373;">5명이 응원했어요</div>
      </div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">방명록 사진</div>
      <div style="font-size:11px;color:#737373;margin-bottom:8px;">내 네컷사진을 벽에 슬쩍 붙여둘 수 있어요</div>
      <div style="padding:8px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.1);font-size:13px;color:#737373;margin-bottom:8px;">닉네임 (선택)</div>
      <div style="padding:12px;border-radius:12px;border:2px dashed rgba(26,26,26,.15);text-align:center;font-size:13px;font-weight:500;margin-bottom:20px;">사진 선택해서 붙이기</div>

      <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:#737373;margin-bottom:8px;">응원 댓글</div>

      <div style="padding:8px 12px;border-radius:12px;background:rgba(26,26,26,.03);margin-bottom:8px;">
        <div style="font-size:11px;font-weight:500;">민지</div>
        <div style="font-size:13px;margin-top:2px;">너무 예쁘다!! 🥰</div>
      </div>
      <div style="padding:8px 12px;border-radius:12px;background:rgba(26,26,26,.03);margin-bottom:12px;">
        <div style="font-size:11px;font-weight:500;">준호</div>
        <div style="font-size:13px;margin-top:2px;">우리 추억 최고 👍</div>
      </div>

      <div style="padding:8px 12px;border-radius:12px;border:1px solid rgba(26,26,26,.1);font-size:13px;color:#737373;margin-bottom:8px;">응원 메시지를 남겨주세요</div>
      <div style="width:100%;padding:10px;border-radius:12px;background:#1a1a1a;color:#fafafa;text-align:center;font-size:13px;font-weight:500;">댓글 남기기</div>
    </div>
  </div>
</div>

<p style="text-align:center;margin-top:16px;font-size:12px;color:#737373;">PhotoWall UI 목업 · 응원 &amp; 방명록 (벽 보기 화면)</p>
</body>
</html>
